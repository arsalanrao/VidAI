# Render.com — Path B (free tier, no VPS)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: vidaipro-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: mkdir -p bin && curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o bin/yt-dlp && chmod +x bin/yt-dlp && npm install --include=dev && npx prisma db push && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_WORKER
        value: "true"
      - key: YTDLP_PATH
        value: ./bin/yt-dlp
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: MOONSHOT_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MAGPIE_API_KEY
        sync: false
      - key: PC_SERVER_URL
        sync: false
      - key: PC_API_SECRET
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
